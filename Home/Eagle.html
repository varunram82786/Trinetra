<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eagle</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family:'Inter', sans-serif;
            height:100vh;
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            color:white;
            display:flex;
            flex-direction:column;
        }

        /* ---------- TOP BAR ---------- */
        .topbar {
            height:60px;
            display:flex;
            align-items:center;
            padding:0 20px;
            background:#111827;
            border-bottom:1px solid #1f2937;
            gap:16px;
            flex-shrink:0;
        }

        .topbar h1 {
            font-size:22px;
            font-weight:600;
            cursor:pointer;
            transition:0.2s;
        }

        .topbar h1:hover { color:#ef4444; }

        /* hamburger — hidden on desktop */
        .hamburger {
            display:none;
            flex-direction:column;
            gap:5px;
            cursor:pointer;
            padding:4px;
            margin-left:auto;
        }

        .hamburger span {
            display:block;
            width:22px;
            height:2px;
            background:#e5e7eb;
            border-radius:2px;
            transition:0.25s;
        }

        /* ---------- MAIN LAYOUT ---------- */
        .container {
            flex:1;
            display:flex;
            overflow:hidden;
            position:relative;
        }

        /* ---------- SIDEBAR ---------- */
        .sidebar {
            width:220px;
            background:#111827;
            border-right:1px solid #1f2937;
            padding:20px 12px;
            display:flex;
            flex-direction:column;
            gap:10px;
            flex-shrink:0;
            transition:transform 0.3s ease;
        }

        .side-btn {
            padding:11px 16px;
            border:none;
            border-radius:10px;
            background:#1f2937;
            color:#e5e7eb;
            font-size:14px;
            text-align:left;
            cursor:pointer;
            transition:0.25s;
        }

        .side-btn:hover { background:#ef4444; transform:translateX(4px); }
        .side-btn.active { background:#ef4444; }

        /* ---------- CONTENT AREA ---------- */
        .content { flex:1; background:#0f172a; overflow:hidden; }

        iframe { width:100%; height:100%; border:none; }

        /* overlay — hidden by default */
        .overlay {
            display:none;
            position:absolute;
            inset:0;
            background:rgba(0,0,0,0.55);
            z-index:10;
        }

        /* ---------- MOBILE ---------- */
        @media (max-width:640px) {

            .hamburger { display:flex; }

            .sidebar {
                position:absolute;
                top:0; left:0;
                height:100%;
                z-index:20;
                transform:translateX(-100%);
                width:200px;
            }

            .sidebar.open { transform:translateX(0); }

            .overlay.open { display:block; }
        }
    </style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
    <h1 onclick="window.open('https://trinetra3.netlify.app/home/eagle')">Eagle</h1>
    <div class="hamburger" id="hamburger" onclick="toggleSidebar()">
        <span></span><span></span><span></span>
    </div>
</div>

<!-- MAIN -->
<div class="container">

    <!-- overlay (mobile tap-to-close) -->
    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
        <button class="side-btn" onclick="changePage(this, '../Pages/Trinetra.html')">Trinetra</button>
        <button class="side-btn" onclick="changePage(this, '../Pages/Education.html')">Education</button>
        <button class="side-btn" onclick="changePage(this, '../Pages/Google.html')">Google</button>
        <button class="side-btn" onclick="changePage(this, '../Pages/Other.html')">Other</button>
        <button class="side-btn" onclick="changePage(this, '../Pages/Eagle.html')">Eagle</button>
        <button class="side-btn active" onclick="changePage(this, '../Pages/Classes.html')">Classes</button>
        <button class="side-btn" onclick="window.open('https://astrayhawk.github.io/Info/')">Info</button>
    </div>

    <!-- IFRAME CONTENT -->
    <div class="content">
        <iframe id="mainFrame" src="../Pages/Classes.html"></iframe>
    </div>

</div>

<script>
    function changePage(button, url) {
        document.querySelectorAll('.side-btn').forEach(btn => btn.classList.remove('active'));
        button.classList.add('active');
        document.getElementById("mainFrame").src = url;
        // close sidebar on mobile after selecting
        if (window.innerWidth <= 640) toggleSidebar();
    }

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('open');
    }
</script>

</body>
</html>
