<body>

<h1>Hello World</h1>


<label for="textInput">Enter text:</label>

<input type="text" id="textInput">
<button onclick="convertTextToCode()">Convert To Code</button>
<br><br>
<label for="textInput">Enter code:</label>
<br>
<input type="text" id="textInputCode">
<button onclick="convertCodeToText()">Convert To Text</button>

<script>
    function convertTextToCode() {
        var text = document.getElementById('textInput').value;
        var url1 = "https://script.google.com/macros/s/AKfycbzvWabeaDsWbDiiidZ-7Ew93Oxnkb3tr7Ddcfk1k4mOsz2JSZq1fFl5NETGEB8JfOPG/exec?action=convertTextToCode&text=" + encodeURIComponent(text);
        get(url1);
    }

    function convertCodeToText() {
        var text = document.getElementById('textInputCode').value;
        var url1 = "https://script.google.com/macros/s/AKfycbzvWabeaDsWbDiiidZ-7Ew93Oxnkb3tr7Ddcfk1k4mOsz2JSZq1fFl5NETGEB8JfOPG/exec?action=convertCodeToText&code=" + encodeURIComponent(text);
        get(url1);
    }

    function get(url) {
        // Perform GET request here
        // For simplicity, I'll just log the URL
        console.log("GET request to:", url);
    }

        async function get(url) {
            try {
                console.log('varun SourceCodeUrl:', url);

                const response = await fetch(url, {
                    method: 'GET',
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! Status: ${response.status}`);
                }

                const sourceCode = await response.text();
                console.log('varun get:', sourceCode);

                if(url.includes('text')){
                    alert(sourceCode);
                }else(url.includes('code')){

                }

                return sourceCode;
            } catch (error) {
                console.error('varun get:', error.message);
                alert(error.message);
                return null;
            }
        }
</script>
